<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN 节点控制中心 | 全球加速发布</title>
    <style>
        :root {
            --primary: #00e5ff;
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.8);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at center, rgba(0, 229, 255, 0.05) 0%, transparent 70%),
                url('https://unsplash.com'); /* 背景图：服务器集群/电路感 */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Consolas', 'Monaco', monospace;
            overflow: hidden;
            color: #fff;
        }

        /* 背景网格装饰 */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        .cdn-panel {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 4px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(0, 229, 255, 0.1);
        }

        /* 顶部装饰条 */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 15px;
        }

        .dot-group { display: flex; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); opacity: 0.5; }
        .dot.active { opacity: 1; box-shadow: 0 0 10px var(--primary); animation: breathe 2s infinite; }

        @keyframes breathe { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        h1 { font-size: 20px; margin: 0; letter-spacing: 2px; color: var(--primary); text-shadow: 0 0 8px rgba(0,229,255,0.5); }

        /* 核心跳转 */
        .main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;
        }

        .main-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px var(--primary);
        }

        /* CDN 节点数据展示 */
        .node-stats {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .stat-label { font-size: 9px; color: #64748b; margin-bottom: 4px; display: block; }
        .stat-value { font-size: 12px; color: #00ffa3; }

        /* 备用信息区域 */
        .info-row {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 15px;
            margin-bottom: 12px;
            border: 1px dashed rgba(0, 229, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-label { font-size: 10px; color: #94a3b8; }
        .info-content { font-size: 13px; color: #fff; }

        .copy-link {
            color: var(--primary);
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
        }

        .copy-link:hover { color: #fff; }

        /* 复制反馈提示 */
        #toast {
            position: fixed;
            top: 20px;
            background: var(--primary);
            color: #000;
            padding: 8px 20px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 2px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="toast">SYSTEM: DATA_COPIED_TO_CLIPBOARD</div>

    <div class="cdn-panel">
        <div class="panel-header">
            <div class="dot-group">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <h1>CDN ACCESS TERMINAL</h1>
        </div>

        <!-- 1. 主进入按钮 -->
        <a href="https://your-cdn-portal.com" target="_blank" class="main-btn">
            [ 建立全球边缘连接 ]
        </a>

        <!-- 2. 模拟 CDN 数据面板 -->
        <div class="node-stats">
            <div class="stat-card">
                <span class="stat-label">全球活跃节点</span>
                <span class="stat-value">1,248 Nodes</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">当前最优节点</span>
                <span class="stat-value">HKG-Cluster-04</span>
            </div>
        </div>

        <!-- 3. 备用地址与复制 -->
        <div>
            <span style="font-size: 10px; color: #475569; margin-bottom: 8px; display: block;">BACKUP EDGE / 备用分发节点</span>
            <div class="info-row">
                <span class="info-content" id="url">mirror.cdn-fast.io</span>
                <span class="copy-link" onclick="copy('url')">COPY</span>
            </div>
        </div>

        <!-- 4. 备用邮箱与复制 -->
        <div>
            <span style="font-size: 10px; color: #475569; margin-bottom: 8px; display: block;">TECHNICAL SUPPORT / 紧急联络</span>
            <div class="info-row">
                <span class="info-content" id="email">noc@cdn-service.com</span>
                <span class="copy-link" onclick="copy('email')">COPY</span>
            </div>
        </div>

        <!-- 底部版本与模拟 ID -->
        <div style="margin-top: 25px; display: flex; justify-content: space-between; font-size: 9px; color: #334155;">
            <span>ID: 0xFD-7742</span>
            <span>PROTECTED BY SSL-AES256</span>
        </div>
    </div>

    <script>
        function copy(id) {
            const text = document.getElementById(id).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
