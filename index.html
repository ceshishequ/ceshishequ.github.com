<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统访问终端 | 科技版</title>
    <style>
        /* 科技感全局设定 */
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        body {
            margin: 0;
            padding: 0;
            background: #000 url('https://unsplash.com') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* 背景遮罩，增加深度感 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,20,40,0.4) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }

        /* 核心科技卡片 */
        .terminal-box {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 450px;
            background: rgba(10, 25, 41, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid #00f2ff;
            border-radius: 4px; /* 硬朗线条更具科技感 */
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2), inset 0 0 20px rgba(0, 242, 255, 0.1);
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%); /* 切角设计 */
        }

        /* 扫描线动画 */
        .terminal-box::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.5);
            animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* 标题样式 */
        h1 {
            color: #00f2ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 26px;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.8);
        }

        .status-bar {
            font-size: 10px;
            color: #00f2ff;
            margin-bottom: 30px;
            opacity: 0.7;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* 霓虹按钮 */
        .main-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: transparent;
            color: #00f2ff;
            text-decoration: none;
            border: 1px solid #00f2ff;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .main-btn:hover {
            background: rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
            transform: scale(1.02);
        }

        /* 数据条目 */
        .data-row {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #00f2ff;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label { font-size: 10px; color: #55aaff; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .value { font-family: 'Courier New', Courier, monospace; color: #fff; font-size: 14px; }
        
        .copy-trigger {
            font-size: 12px;
            color: #00f2ff;
            cursor: pointer;
            border: 1px solid #00f2ff;
            padding: 2px 8px;
            border-radius: 2px;
        }

        .copy-trigger:hover { background: #00f2ff; color: #000; }

        /* 弹窗提示 */
        #toast {
            position: fixed;
            bottom: 30px;
            background: #00f2ff;
            color: #000;
            padding: 8px 20px;
            font-weight: bold;
            font-size: 14px;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="toast">SYSTEM: DATA COPIED</div>

    <div class="terminal-box">
        <div class="status-bar">
            <span>● SYSTEM ONLINE</span>
            <span>● ENCRYPTED</span>
        </div>
        
        <div style="text-align:center; margin-bottom: 40px;">
            <h1>核心接入终端</h1>
        </div>

        <!-- 1. 核心跳转 -->
        <a href="https://your-main-site.com" target="_blank" class="main-btn">
            [ 执行初始化连接 ]
        </a>

        <!-- 2. 备用地址 -->
        <div>
            <span class="label">Primary Mirror / 备用节点</span>
            <div class="data-row">
                <span class="value" id="url">bak.yournetwork.io</span>
                <span class="copy-action copy-trigger" onclick="copy('url')">COPY</span>
            </div>
        </div>

        <!-- 3. 备用邮箱 -->
        <div>
            <span class="label">Support Channel / 通讯密钥</span>
            <div class="data-row">
                <span class="value" id="email">core@protocol.sh</span>
                <span class="copy-action copy-trigger" onclick="copy('email')">COPY</span>
            </div>
        </div>

        <div style="margin-top:30px; text-align: center; font-size: 9px; color: #336688; letter-spacing: 2px;">
            VER: 2.0.4 // SESSION: 0x88492AF
        </div>
    </div>

    <script>
        function copy(id) {
            const text = document.getElementById(id).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        }
    </script>
</body>
</html>
