<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>官方发布页 | 永久导航</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
        .copy-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="min-h-screen text-slate-200 flex flex-col items-center py-12 px-4">

    <!-- 头部 LOGO -->
    <div class="text-center mb-10">
        <h1 class="text-3xl font-extrabold text-white tracking-tight">项目官方发布中心</h1>
        <p class="text-slate-500 mt-2 text-sm">建议收藏本页，获取永久更新链接</p>
    </div>

    <div class="max-w-md w-full space-y-6">
        
        <!-- 1. 核心跳转按钮 -->
        <a href="https://main-site.com" target="_blank" 
           class="block w-full py-5 bg-blue-600 hover:bg-blue-500 text-white text-center rounded-2xl font-bold text-xl shadow-xl shadow-blue-900/30 transition-all transform hover:-translate-y-1">
            🚀 进入官方主站
        </a>

        <!-- 2. 备用地址区域 -->
        <div class="glass-card rounded-2xl p-5">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-3 pl-1">备用访问地址</label>
            <div class="flex items-center justify-between bg-black/30 rounded-xl p-3 border border-white/5 group">
                <code class="text-blue-400 font-mono text-sm truncate mr-2" id="url-text">https://yourdomain.com</code>
                <button onclick="copyToClipboard('url-text')" 
                        class="copy-btn px-3 py-1.5 bg-slate-700 hover:bg-slate-600 text-white text-xs rounded-lg transition-all shrink-0">
                    复制网址
                </button>
            </div>
        </div>

        <!-- 3. 备用邮箱区域 -->
        <div class="glass-card rounded-2xl p-5">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-3 pl-1">联系与申诉邮箱</label>
            <div class="flex items-center justify-between bg-black/30 rounded-xl p-3 border border-white/5 group">
                <code class="text-purple-400 font-mono text-sm truncate mr-2" id="email-text">admin@yourdomain.com</code>
                <button onclick="copyToClipboard('email-text')" 
                        class="copy-btn px-3 py-1.5 bg-slate-700 hover:bg-slate-600 text-white text-xs rounded-lg transition-all shrink-0">
                    复制邮箱
                </button>
            </div>
        </div>

        <!-- 友情提示 -->
        <div class="text-center text-slate-500 text-xs mt-8 space-y-1">
            <p>由于网络环境复杂，建议保存备用联系方式</p>
            <p>© 2024 Project Name. All Rights Reserved.</p>
        </div>
    </div>

    <!-- 复制成功的轻提示 (Toast) -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-green-600 text-white rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none font-medium">
        已成功复制到剪贴板
    </div>

    <script>
        function copyToClipboard(id) {
            const text = document.getElementById(id).innerText;
            const toast = document.getElementById('toast');
            
            // 使用现代 API 复制
            navigator.clipboard.writeText(text).then(() => {
                // 显示轻提示
                toast.style.opacity = '1';
                setTimeout(() => {
                    toast.style.opacity = '0';
                }, 2000);
            }).catch(err => {
                alert('复制失败，请手动选择复制');
            });
        }
    </script>

</body>
</html>
