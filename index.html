<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global CDN | 全球加速入口</title>
    <style>
        :root {
            --accent: #ffffff;
            --sub: rgba(255, 255, 255, 0.5);
            --bg: #050505;
        }

        * { box-sizing: border-box; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--accent);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 极简流体背景 */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 80% 20%, #1a365d 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, #2d1a5d 0%, transparent 40%);
            filter: blur(80px);
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .wrapper {
            width: 90%;
            max-width: 1000px;
            text-align: center;
        }

        /* 大气排版 */
        .hero-text {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 20px;
            line-height: 1;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-sub {
            font-size: 18px;
            color: var(--sub);
            margin-bottom: 60px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 核心行动区：超大按钮 */
        .main-link {
            display: inline-block;
            padding: 24px 80px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
            border-radius: 100px;
            margin-bottom: 80px;
            box-shadow: 0 20px 40px rgba(255,255,255,0.1);
        }

        .main-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(255,255,255,0.2);
            padding: 24px 100px;
        }

        /* 信息网格 */
        .info-grid {
            display: grid;
            grid-template-cols: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 60px;
        }

        .info-card {
            text-align: left;
            padding: 20px;
        }

        .card-label {
            font-size: 12px;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .card-value {
            font-size: 20px;
            font-family: "Monaco", monospace;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 6px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .copy-btn:hover {
            background: #fff;
            color: #000;
        }

        /* 吐司提示 */
        #toast {
            position: fixed;
            bottom: 40px;
            background: #fff;
            color: #000;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div id="toast">COPIED TO CLIPBOARD</div>

    <div class="wrapper">
        <div class="hero-sub">Secure Delivery Network</div>
        <h1 class="hero-text">Next-Gen<br>CDN Protocol</h1>
        
        <a href="https://your-main-site.com" class="main-link">ENTER TERMINAL</a>

        <div class="info-grid">
            <!-- 备用地址 -->
            <div class="info-card">
                <span class="card-label">Secondary Node / 备用节点</span>
                <div class="card-value">
                    <span id="url">global.cdn-backup.io</span>
                    <button class="copy-btn" onclick="copy('url')">COPY</button>
                </div>
            </div>

            <!-- 邮箱信息 -->
            <div class="info-card">
                <span class="card-label">Support Email / 联络信道</span>
                <div class="card-value">
                    <span id="email">support@network.sh</span>
                    <button class="copy-btn" onclick="copy('email')">COPY</button>
                </div>
            </div>
        </div>

        <div style="margin-top: 60px; font-size: 12px; color: rgba(255,255,255,0.2); letter-spacing: 2px;">
            STABLE CONNECTED // LATENCY < 10MS // NODE: HKG-01
        </div>
    </div>

    <script>
        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            });
        }
    </script>
</body>
</html>
