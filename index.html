<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>官方发布页</title>
    <style>
        /* 核心样式：确保纯本地也能看 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 20px; }
        
        /* 1. 主跳转按钮 */
        .main-btn {
            display: block;
            background: #007aff;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .main-btn:active { transform: scale(0.95); background: #0056b3; }

        /* 2. 备用信息区域 */
        .info-box {
            background: #2c2c2c;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }
        .label { font-size: 12px; color: #888; margin-bottom: 8px; display: block; }
        .content-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .text-value {
            font-family: monospace;
            font-size: 14px;
            color: #4da3ff;
            word-break: break-all;
            margin-right: 10px;
        }
        .copy-btn {
            background: #444;
            color: #eee;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        .copy-btn:active { background: #666; }

        /* 提示弹窗 */
        #toast {
            position: fixed;
            bottom: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>官方导航中心</h1>

    <!-- 第一个：跳转按钮 -->
    <a href="https://your-website.com" target="_blank" class="main-btn">
        🚀 点击进入主站点
    </a>

    <!-- 第二个：备用地址 -->
    <div class="info-box">
        <span class="label">备用访问地址</span>
        <div class="content-row">
            <span class="text-value" id="url-text">https://domain.com</span>
            <button class="copy-btn" onclick="copy('url-text')">复制</button>
        </div>
    </div>

    <!-- 第三个：备用邮箱 -->
    <div class="info-box">
        <span class="label">联系与技术支持</span>
        <div class="content-row">
            <span class="text-value" id="email-text">help@domain.com</span>
            <button class="copy-btn" onclick="copy('email-text')">复制</button>
        </div>
    </div>

    <div id="toast">复制成功！</div>
</div>

<script>
    function copy(id) {
        const text = document.getElementById(id).innerText;
        // 创建临时输入框实现复制
        const input = document.createElement('input');
        input.setAttribute('value', text);
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);

        // 显示提示
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }
</script>

</body>
</html>
