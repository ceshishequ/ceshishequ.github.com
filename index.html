<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永久发布页 - 防失联</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #333; font-size: 24px; }
        .notice { color: red; font-size: 14px; margin-bottom: 20px; font-weight: bold; }
        
        /* 按钮样式 */
        .btn { display: block; background: #007bff; color: white; text-decoration: none; padding: 12px; margin: 10px 0; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #0056b3; }
        .btn-mail { background: #28a745; cursor: pointer; }
        
        .info-box { background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; word-break: break-all; margin-top: 20px; font-size: 14px; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h1>官方永久发布页</h1>
    <p class="notice">建议截图保存本页，防止失联</p>

    <!-- 请将下面的网址换成你的实际项目地址 -->
    <a href="https://github.com" class="btn" target="_blank">官方开源仓库</a>
    <a href="https://t.me" class="btn" target="_blank">Telegram 频道</a>
    
    <!-- 邮箱点击自动复制 -->
    <div class="btn btn-mail" onclick="copyMail()">点击复制联系邮箱</div>

    <div class="info-box">
        当前访问地址：<br>
        <span id="url-text">获取中...</span>
    </div>

    <div class="footer">
        © <span id="year"></span> 官方发布页
    </div>
</div>

<script>
    // 自动显示当前网址
    document.getElementById('url-text').innerText = window.location.href;
    document.getElementById('year').innerText = new Date().getFullYear();

    // 复制邮箱功能
    function copyMail() {
        const mail = "admin@example.com"; // 这里改成你的真实邮箱
        navigator.clipboard.writeText(mail).then(() => {
            alert("邮箱已复制: " + mail);
        });
    }
</script>

</body>
</html>
